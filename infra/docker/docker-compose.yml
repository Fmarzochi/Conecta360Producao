services:
  mongodb:
    image: mongo:8.0
    container_name: conecta360-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
      MONGO_APP_USER: ${MONGO_APP_USER}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - conecta360-network

  prisma-migrate:
    image: node:20-alpine
    container_name: conecta360-prisma-migrate
    restart: on-failure:3
    depends_on:
      mongodb:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ../../packages/database:/app
      - prisma_node_modules:/app/node_modules
    environment:
      DATABASE_URL: mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=${MONGO_DB_NAME}
    command: sh -c "npm install --silent && npx prisma db push"
    networks:
      - conecta360-network

  mongo-express:
    image: mongo-express:1.0.2
    container_name: conecta360-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin123}
      ME_CONFIG_SITE_BASEURL: /
    ports:
      - "127.0.0.1:${MONGO_EXPRESS_PORT:-8081}:8081"
    networks:
      - conecta360-network

volumes:
  mongodb_data:
    name: conecta360-mongodb-data
    driver: local
  prisma_node_modules:
    name: conecta360-prisma-node-modules
    driver: local

networks:
  conecta360-network:
    name: conecta360-network
    driver: bridge
